name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Validate version matches script
        run: |
          script_version=$(grep '^VERSION=' ndoc | cut -d'"' -f2)
          if [[ "$script_version" != "${{ github.event.inputs.version }}" ]]; then
            echo "Error: VERSION in ndoc is '$script_version' but input is '${{ github.event.inputs.version }}'"
            exit 1
          fi

      - name: Generate checksum
        run: sha256sum ndoc > ndoc.sha256

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          gh release create "v${{ github.event.inputs.version }}" \
            ndoc ndoc.sha256 \
            --title "v${{ github.event.inputs.version }}" \
            --generate-notes

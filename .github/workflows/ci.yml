name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          severity: warning

  shellcheck-macos:
    name: ShellCheck (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: brew install shellcheck
      - name: Run ShellCheck
        run: shellcheck ndoc
